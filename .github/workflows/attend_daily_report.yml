name: SJAMES 봉사기록부 일일 리포트

on:
  schedule:
    # ★ 매일 KST 07:00 = UTC 22:00 (전날)
    #   매일(월~일) 발송 + 관리자 지정 공휴일(attend_holidays) 제외
    #   판정 로직은 attend_daily_report.py 내부에서 처리
    #   ⚠️ GitHub Actions cron은 분 단위 지연이 잦아 07시로 앞당겨 08시 도착 목표
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  send-attend-report:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 봉사기록부 일일 리포트 발송
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TZ: Asia/Seoul
        run: |
          python attend_daily_report.py
