name: SJAMES 텔레그램 알림

on:
  schedule:
    # ★ 매일 KST 09:00 = UTC 00:00 (계획보고 관련 알림)
    - cron: '0 0 * * *'
    # ★ 매일 KST 18:00 = UTC 09:00 (결과보고 관련 알림 - 20일~말일만)
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      force_type:
        description: '수동 발송 종류 (테스트용)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - 'monthly'         # 월간 시작 (1일 09시)
          - 'midmonth'        # 중간 점검 (15일 09시)
          - 'deadline'        # 마감 D-1 (말일-1 09시)
          - 'plan_reminder'   # 계획보고 미제출 (5일~말일-1 09시)
          - 'result_reminder' # 결과보고 미제출 (20일~말일 18시)

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 알림 스크립트 실행
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          APP_URL: ${{ secrets.APP_URL }}
          FORCE_TYPE: ${{ github.event.inputs.force_type }}
          TZ: Asia/Seoul
        run: |
          python notify_telegram.py
