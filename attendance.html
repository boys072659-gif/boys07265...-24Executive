<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SJAMES 봉사 기록부</title>

<!-- Pretendard: Inter 같은 느낌의 한국 모던 폰트 -->
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  /* Design tokens — React 봉사 기록부 톤 그대로
     베이지 + 짙은 네이비 + 사프란 노랑, 모든 텍스트 산세리프 */
  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  :root {
    /* 배경 */
    --bg:          #FAF8F4;
    --bg-card:     #FFFFFF;
    --bg-subtle:   #F3F1EC;
    --bg-soft:     #FCFBF8;

    /* 본문 — 짙은 네이비 잉크 */
    --text:        #1C2333;
    --text-2:      #4B5468;
    --text-3:      #6B7280;
    --text-4:      #9CA3AF;
    --text-on-dark:#D7DCE5;
    --text-faint:  #9CA6BD;

    /* 경계선 */
    --border:      #E8E4DA;
    --border-2:    #EDE9DF;
    --border-3:    #E0DCD0;

    /* 강조 — 사프란 노랑 (Brand accent) */
    --action:      #E8A33D;
    --action-soft: #FBEED2;
    --action-deep: #C28525;

    /* 상태 */
    --ok:          #1C7C54;
    --ok-soft:     #E7F5EC;
    --late:        #D14343;
    --late-soft:   #FBEAEA;
    --absent:      #9CA3AF;
    --absent-soft: #F3F4F6;

    /* 폰트 */
    --font: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont,
            "Apple SD Gothic Neo", system-ui, sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    letter-spacing: -0.005em;
  }

  button, input, select {
    font-family: var(--font);
    font-size: 14px;
    color: var(--text);
  }

  /* ─── 상단바 ─── */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    background: #FFFFFF;
    position: sticky;
    top: 0;
    z-index: 10;
    flex-wrap: wrap;
    gap: 12px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .brand-mark {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: var(--text);              /* 짙은 네이비 */
    color: var(--action);                 /* 사프란 */
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 16px;
  }
  .brand-name .title {
    font-weight: 800;
    font-size: 16px;
    letter-spacing: -0.01em;
    color: var(--text);
  }
  .brand-name .sub {
    display: block;
    font-size: 12.5px;
    color: var(--text-3);
    margin-top: 1px;
  }

  /* 탭 (React 톤 — 배경 박스 + 활성 다크) */
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--bg-subtle);
    padding: 4px;
    border-radius: 10px;
  }
  .tab {
    border: none;
    background: transparent;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13.5px;
    font-weight: 600;
    color: var(--text-3);
    cursor: pointer;
  }
  .tab:hover { color: var(--text); }
  .tab.active {
    background: var(--text);
    color: #FFFFFF;
  }

  /* ─── 메인 ─── */
  .main {
    max-width: 720px;
    margin: 0 auto;
    padding: 28px 20px 60px;
  }

  /* 탭 패널 */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; animation: tabIn 0.2s; }
  @keyframes tabIn {
    from { opacity: 0; transform: translateY(2px); }
    to   { opacity: 1; transform: none; }
  }

  /* ─── 사명자 선택 줄 ─── */
  .picker-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
    font-size: 13px;
    flex-wrap: wrap;
  }
  .picker-label {
    color: var(--text-3);
  }
  .picker-row select {
    border: 1px solid var(--border-3);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 13.5px;
    background: #fff;
    color: var(--text);
    cursor: pointer;
  }
  .picker-row select:disabled {
    background: var(--bg-subtle);
    color: var(--text-3);
    cursor: not-allowed;
  }
  .picker-row select:focus {
    outline: none;
    border-color: var(--text);
  }

  /* ─── 시계 카드 — 시그니처 ─── */
  /* React 코드 그대로: 짙은 네이비 + 큰 시계 + 사프란 버튼 */
  .clock-card {
    background: var(--text);                /* 짙은 네이비 */
    border-radius: 20px;
    padding: 36px 28px;
    text-align: center;
    color: #FFFFFF;
    margin-bottom: 20px;
  }
  .clock-label {
    font-size: 12.5px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }
  .clock-display {
    font-size: 52px;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
    line-height: 1;
    margin-bottom: 18px;
  }
  .status-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 20px;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #D1D5DB;
    display: inline-block;
  }
  .status-dot.working { background: var(--action); }
  .status-dot.done    { background: #6B7280; }
  .status-text {
    font-size: 13.5px;
    color: var(--text-on-dark);
  }

  /* 버튼들 */
  .actions {
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .btn-start, .btn-end {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border: none;
    font-weight: 700;
    font-size: 15px;
    padding: 14px 36px;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.12s;
  }
  .btn-start {
    background: var(--action);
    color: var(--text);
  }
  .btn-start:hover:not(:disabled) {
    background: #F2B255;
  }
  .btn-start:disabled {
    background: #C9933F;
    opacity: 0.55;
    cursor: not-allowed;
  }
  .btn-end {
    background: transparent;
    color: #FFFFFF;
    border: 1.5px solid #4B5468;
  }
  .btn-end:hover {
    border-color: #7280A0;
    background: rgba(255,255,255,0.04);
  }

  .done-box {
    display: inline-block;
    font-size: 13.5px;
    color: var(--text-faint);
    border: 1px dashed #4B5468;
    border-radius: 10px;
    padding: 12px 18px;
  }

  /* ─── 카드 (기록) ─── */
  .card {
    background: #FFFFFF;
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
  }
  .card-heading {
    display: flex;
    align-items: center;
    gap: 7px;
    font-weight: 700;
    font-size: 14px;
    margin-bottom: 14px;
    color: var(--text);
  }
  .card-heading .meta {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-3);
    font-weight: 500;
    font-variant-numeric: tabular-nums;
  }

  /* 기록 행 */
  .history-list { display: flex; flex-direction: column; gap: 2px; }
  .history-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 0;
    border-bottom: 1px solid var(--bg-subtle);
    font-size: 13.5px;
  }
  .history-row:last-child { border-bottom: none; }
  .history-date {
    width: 84px;
    color: var(--text-3);
    font-weight: 500;
    font-variant-numeric: tabular-nums;
  }
  .history-time {
    flex: 1;
    font-variant-numeric: tabular-nums;
  }
  .history-duration {
    color: var(--text-3);
    font-variant-numeric: tabular-nums;
    font-size: 13px;
    min-width: 80px;
    text-align: right;
  }
  .tag {
    font-size: 11.5px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 6px;
    white-space: nowrap;
  }
  .tag.working { background: var(--action-soft); color: var(--action-deep); }
  .tag.done    { background: var(--absent-soft); color: var(--text-3); }
  .tag.late    { background: var(--late-soft); color: var(--late); }
  .tag.ok      { background: var(--ok-soft); color: var(--ok); }

  /* GPS 인증 칩 */
  .gps-chip {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 10.5px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 5px;
    white-space: nowrap;
  }
  .gps-chip.ok   { background: var(--ok-soft); color: var(--ok); }
  .gps-chip.miss { background: var(--absent-soft); color: var(--text-3); }

  /* 사유 (기록 행 아래 두 번째 줄) */
  .history-row-wrap {
    border-bottom: 1px solid var(--bg-subtle);
    padding: 10px 0;
  }
  .history-row-wrap:last-child { border-bottom: none; }
  .history-row-wrap .history-row {
    padding: 0;
    border-bottom: none;
  }
  .history-reason {
    margin-top: 5px;
    margin-left: 98px;
    font-size: 12px;
    color: var(--text-3);
    line-height: 1.4;
  }

  /* 빈 상태 */
  .empty {
    text-align: center;
    padding: 32px 20px;
    color: var(--text-3);
    font-size: 13.5px;
  }
  .empty .icon { font-size: 32px; opacity: 0.5; margin-bottom: 10px; }
  .empty .msg { font-weight: 600; color: var(--text-2); }
  .empty .hint { font-size: 12.5px; margin-top: 4px; color: var(--text-3); }

  /* 로딩 */
  .loading {
    text-align: center;
    padding: 28px 16px;
    color: var(--text-3);
    font-size: 13px;
  }
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid var(--border-3);
    border-top-color: var(--text);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
    vertical-align: -2px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 토스트 */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: var(--text);
    color: #FFFFFF;
    padding: 12px 18px;
    border-radius: 10px;
    font-size: 13.5px;
    font-weight: 500;
    opacity: 0;
    pointer-events: none;
    transition: all 0.2s;
    z-index: 1000;
    max-width: 86vw;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ─── 사유 입력 모달 ─── */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(28,35,51,0.55);
    backdrop-filter: blur(6px);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 500;
  }
  .modal-backdrop.show {
    display: flex;
    animation: fadeIn 0.18s;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .reason-modal {
    background: #FFFFFF;
    border-radius: 16px;
    width: 100%;
    max-width: 420px;
    overflow: hidden;
    box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    animation: modalIn 0.2s;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.96); }
    to   { opacity: 1; transform: none; }
  }
  .reason-modal-head {
    padding: 22px 24px 0;
  }
  .reason-modal-title {
    font-size: 17px;
    font-weight: 800;
    color: var(--text);
    margin: 0 0 6px;
    letter-spacing: -0.01em;
  }
  .reason-modal-sub {
    font-size: 13px;
    color: var(--text-3);
    margin: 0;
    line-height: 1.55;
  }
  .reason-modal-body {
    padding: 20px 24px;
  }
  .reason-modal-body label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-3);
    margin-bottom: 7px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .reason-modal-body textarea {
    width: 100%;
    min-height: 80px;
    padding: 11px 13px;
    border: 1px solid var(--border-3);
    border-radius: 10px;
    font-family: var(--font);
    font-size: 14px;
    color: var(--text);
    resize: vertical;
    line-height: 1.5;
  }
  .reason-modal-body textarea:focus {
    outline: none;
    border-color: var(--text);
  }
  .reason-modal-footer {
    padding: 14px 24px 20px;
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }
  .reason-modal-footer button {
    border: none;
    padding: 10px 18px;
    border-radius: 9px;
    font-weight: 700;
    cursor: pointer;
    font-size: 13.5px;
  }
  .reason-modal-footer .btn-cancel {
    background: var(--bg-subtle);
    color: var(--text-2);
  }
  .reason-modal-footer .btn-cancel:hover { background: var(--border-2); }
  .reason-modal-footer .btn-confirm {
    background: var(--text);
    color: #FFFFFF;
  }
  .reason-modal-footer .btn-confirm:hover { background: #2A3247; }
  .reason-modal-footer .btn-confirm:disabled {
    background: var(--text-4);
    cursor: not-allowed;
  }

  /* "본인 잠금" 안내 줄 */
  .locked-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
    padding: 12px 16px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 13.5px;
  }
  .locked-row .lock-icon {
    width: 28px; height: 28px;
    border-radius: 7px;
    background: var(--action-soft);
    color: var(--action-deep);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 800;
    flex-shrink: 0;
  }
  .locked-row .lock-info {
    flex: 1;
    line-height: 1.3;
  }
  .locked-row .lock-info .who {
    font-weight: 700;
    color: var(--text);
  }
  .locked-row .lock-info .where {
    color: var(--text-3);
    font-size: 12.5px;
    margin-top: 2px;
  }
  .locked-row .lock-change {
    background: transparent;
    border: 1px solid var(--border-3);
    color: var(--text-3);
    padding: 6px 11px;
    border-radius: 7px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
  }
  .locked-row .lock-change:hover {
    border-color: var(--text-3);
    color: var(--text);
  }

  /* 봉사 장소 선택 줄 */
  .loc-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    font-size: 13px;
    color: var(--text-3);
    justify-content: center;
  }
  .loc-row select {
    border: 1px solid #4B5468;
    background: #2A3247;
    color: #FFFFFF;
    border-radius: 8px;
    padding: 7px 11px;
    font-size: 13px;
    cursor: pointer;
  }
  .loc-row select:focus { outline: none; border-color: #7280A0; }
  .loc-gps-hint {
    font-size: 11.5px;
    color: var(--text-faint);
    font-weight: 500;
  }
  .loc-gps-hint.on { color: var(--action); }

  /* 관리자 탭 placeholder */
  .admin-placeholder {
    background: #FFFFFF;
    border: 1px dashed var(--border-3);
    border-radius: 16px;
    padding: 60px 20px;
    text-align: center;
  }
  .admin-placeholder .ph-icon { font-size: 36px; opacity: 0.3; margin-bottom: 14px; }
  .admin-placeholder .ph-msg {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-2);
  }
  .admin-placeholder .ph-hint {
    margin-top: 6px;
    font-size: 12.5px;
    color: var(--text-3);
  }

  /* 반응형 */
  @media (max-width: 640px) {
    .topbar { padding: 16px 18px; }
    .main { padding: 20px 14px 50px; }
    .clock-card { padding: 28px 20px 24px; border-radius: 16px; }
    .clock-display { font-size: 42px; }
    .btn-start, .btn-end { padding: 12px 24px; font-size: 14px; }
    .history-date { width: 70px; font-size: 12px; }
    .history-time { font-size: 12.5px; }
    .history-duration { font-size: 12.5px; min-width: 62px; }
  }
</style>
</head>
<body>

<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<!-- 상단바 -->
<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<header class="topbar">
  <div class="brand">
    <div class="brand-mark">봉</div>
    <div class="brand-name">
      <div class="title">봉사 기록부</div>
      <span class="sub" id="page-date">—</span>
    </div>
  </div>
  <nav class="tabs">
    <button class="tab active" data-tab="member" onclick="switchTab('member')">내 봉사</button>
    <button class="tab" data-tab="admin" onclick="switchTab('admin')">관리자</button>
  </nav>
</header>

<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<!-- 메인 -->
<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<main class="main">

  <!-- ━━━ 탭 1: 내 봉사 ━━━ -->
  <div id="tab-member" class="tab-panel active">

    <!-- A) 잠금 전 — 부서·사명자 선택 -->
    <div class="picker-row" id="picker-unlocked">
      <span class="picker-label">부서</span>
      <select id="sel-dept" onchange="onDeptChange()">
        <option value="">부서 선택…</option>
      </select>
      <span class="picker-label">사명자</span>
      <select id="sel-member" disabled onchange="onMemberChange()">
        <option value="">먼저 부서 선택</option>
      </select>
    </div>

    <!-- B) 잠금 후 — "○○○님 기기" 표시 + 변경 -->
    <div class="locked-row" id="picker-locked" style="display:none">
      <div class="lock-icon">✓</div>
      <div class="lock-info">
        <div class="who" id="locked-who">—</div>
        <div class="where" id="locked-where">—</div>
      </div>
      <button class="lock-change" onclick="changeLockedMember()" title="다른 사명자로 변경">
        변경
      </button>
    </div>

    <!-- 시계 카드 -->
    <div class="clock-card">
      <div class="clock-label">현재 시각</div>
      <div class="clock-display" id="clock-display">—:—:—</div>
      <div class="status-row">

function pad(n){ return String(n).padStart(2,'0'); }
function fmtTime(d){ return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`; }
function fmtHM(d){ return `${pad(d.getHours())}:${pad(d.getMinutes())}`; }
function fmtYMD(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function fmtDuration(ms){
  if(!ms || ms < 0) return '—';
  const totalMin = Math.floor(ms / 60000);
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  return `${h}시간 ${pad(m)}분`;
}
function fmtDateKor(dateStr){
  const d = new Date(dateStr);
  const weekday = ['일','월','화','수','목','금','토'][d.getDay()];
  return `${pad(d.getMonth()+1)}.${pad(d.getDate())} (${weekday})`;
}
function fmtDateLong(d){
  const weekday = ['일','월','화','수','목','금','토'][d.getDay()];
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${weekday})`;
}
function escapeHtml(s){
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

// ────────────────────────────────────────────────────────────
// GPS 유틸
// ────────────────────────────────────────────────────────────
function haversineDistance(lat1, lng1, lat2, lng2){
  const R = 6371000;  // 지구 반지름 (m)
  const toRad = x => (x * Math.PI) / 180;
  const dLat = toRad(lat2 - lat1);
  const dLng = toRad(lng2 - lng1);
  const a =
    Math.sin(dLat/2) ** 2 +
    Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function fmtDistance(m){
  if(m == null) return '—';
  if(m < 1000) return `${Math.round(m)}m`;
  return `${(m/1000).toFixed(2)}km`;
}

function getCurrentPosition(){
  return new Promise((resolve, reject) => {
    if(!('geolocation' in navigator)){
      reject({ code: -1, message: '이 브라우저는 위치 기능을 지원하지 않습니다' });
      return;
    }
    navigator.geolocation.getCurrentPosition(
      pos => resolve({
        lat: pos.coords.latitude,
        lng: pos.coords.longitude,
        accuracy: pos.coords.accuracy,
      }),
      err => reject(err),
      { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
    );
  });
}

function gpsErrorText(err){
  if(!err) return '위치를 확인할 수 없습니다';
  if(err.code === 1) return '위치 권한이 거부되었습니다';
  if(err.code === 2) return '위치 정보를 가져올 수 없습니다';
  if(err.code === 3) return '위치 확인 시간 초과';
  return err.message || '위치를 확인할 수 없습니다';
}

// 봉사 장소에 대한 GPS 검증
// 결과: { tried, success, distance, accuracy, lat, lng, message }
async function verifyGPS(location){
  if(!location || !location.gps_enabled){
    return { tried: false, success: null, distance: null, accuracy: null,
             lat: null, lng: null, message: '이 장소는 위치 확인을 사용하지 않습니다' };
  }
  if(location.lat == null || location.lng == null){
    return { tried: false, success: false, distance: null, accuracy: null,
             lat: null, lng: null, message: '봉사 장소에 기준 좌표가 없습니다 (관리자에 문의)' };
  }
  try {
    const fix = await getCurrentPosition();
    const distance = haversineDistance(fix.lat, fix.lng, location.lat, location.lng);
    const radius = Number(location.radius || 100);
    const within = distance <= radius;
    return {
      tried: true,
      success: within,
      distance: Math.round(distance),
      accuracy: Math.round(fix.accuracy),
      lat: fix.lat,
      lng: fix.lng,
      message: within
        ? `위치 확인됨 · ${fmtDistance(distance)} (허용 ${radius}m)`
        : `봉사 장소에서 ${fmtDistance(distance)} 떨어져 있음 (허용 ${radius}m)`,
    };
  } catch(err) {
    return {
      tried: true,
      success: false,
      distance: null,
      accuracy: null,
      lat: null,
      lng: null,
      message: gpsErrorText(err),
    };
  }
}

  // 오늘 기록 상태별로 UI 분기

    // 아직 시작 안 함

    // 봉사 중
    const inHM = fmtHM(new Date(todayRecord.check_in_at));
    const locName = todayRecord.attend_locations?.name || '—';

    statusDot.className = 'status-dot working';
    actions.innerHTML = `<button class="btn-end" id="btn-end" onclick="onEndClick()">봉사 종료</button>`;
    locRow.style.display = 'none';
  } else if(todayRecord.check_in_at && todayRecord.check_out_at){
    // 종료 완료
    const dur = fmtDuration(new Date(todayRecord.check_out_at) - new Date(todayRecord.check_in_at));
    statusText.textContent = `오늘 봉사 종료 · ${dur} 봉사`;
    statusDot.className = 'status-dot done';
    actions.innerHTML = `<div class="done-box">오늘 봉사가 종료되었습니다. 수고하셨습니다.</div>`;
    locRow.style.display = 'none';
  }
}

// 시각이 사유 필요한 시간인지 확인
function needStartReason(now){
  const startMin = WORK_START_HM.h * 60 + WORK_START_HM.m;  // 08:40 → 520
  const nowMin = now.getHours() * 60 + now.getMinutes();
  return nowMin > startMin;
}
function needEndReason(now){
  const endMin = WORK_END_HM.h * 60 + WORK_END_HM.m;        // 20:00 → 1200
  const nowMin = now.getHours() * 60 + now.getMinutes();
  return nowMin < endMin;
}

// 봉사 시작
async function onStartClick(){
  if(!currentMember || !currentLocationId){
    showToast('사명자와 봉사 장소를 선택해주세요');
    return;
  }
  const location = allLocations.find(l => l.id === currentLocationId);
  if(!location){
    showToast('봉사 장소를 찾을 수 없어요');
    return;
  }
  
  // 시작 버튼을 "위치 확인 중..."으로
  const actions = document.getElementById('actions');
  actions.innerHTML = `<button class="btn-start" disabled>📡 위치 확인 중…</button>`;
  
  // GPS 측정
  const gps = await verifyGPS(location);
  
  // 시간 체크
  const now = new Date();
  const lateStart = needStartReason(now);
  
  // 사유 필요 여부 결정
  // (가) 늦은 시작 → 무조건 사유
  // (나) GPS 미인증(권한 거부·거리 초과·좌표 없음) → 사유
  const needReason = lateStart || (gps.tried && gps.success === false) || (gps.tried === false && gps.success === false);
  
  if(needReason){
    // 사유 모달 (GPS 결과 + 시간 정보 함께 표시)
    let title = '봉사 시작 사유 입력';
    let subLines = [];
    if(lateStart){
      subLines.push(`⏰ 기준 시각(${pad(WORK_START_HM.h)}:${pad(WORK_START_HM.m)}) 이후 시작`);
    }
    if(gps.tried && gps.success === false){
      subLines.push(`📍 ${gps.message}`);
    } else if(gps.tried === false && gps.success === false){
      subLines.push(`📍 ${gps.message}`);
    } else if(gps.tried && gps.success === true){
      subLines.push(`📍 ${gps.message}`);
    }
    openReasonModal('start', title, subLines.join('\n'), gps);
    return;
  }
  
  // 정상 — 즉시 시작
  await doStart(null, gps);
}

// 실제 시작 처리
async function doStart(reason, gps){
  if(!currentMember || !currentLocationId){
    showToast('사명자와 봉사 장소를 선택해주세요');
    return;
  }
  const now = new Date();
  const today = fmtYMD(now);
  
  const row = {
    member_id:    currentMemberId,
    location_id:  currentLocationId,
    record_date:  today,
    check_in_at:  now.toISOString(),
    check_in_reason: reason || null,
    // GPS 데이터 (있을 때만)
    check_in_lat:      gps?.lat ?? null,
    check_in_lng:      gps?.lng ?? null,
    check_in_distance: gps?.distance ?? null,
    check_in_accuracy: gps?.accuracy ?? null,
    gps_verified:      gps?.success === true,
  };
  
  const { data, error } = await sb
    .from('attend_records')
    .insert(row)
    .select('*, attend_locations(name)')
    .single();
  
  if(error){
    if(error.code === '23505'){
      showToast('오늘 이미 봉사를 시작하셨어요. 새로고침 후 확인해주세요');
      loadTodayRecord();
    } else {
      console.error('[doStart]', error);
      showToast('봉사 시작 실패: ' + (error.message || '서버 오류'));
    }
    updateClockArea();  // 버튼 복원
    return;
  }
  
  // 사명자 잠금
  if(!isLocked){
    localStorage.setItem(LS_KEY_MEMBER, String(currentMemberId));
    localStorage.setItem(LS_KEY_DEPT,   currentDeptId);
    localStorage.setItem(LS_KEY_LOC,    String(currentLocationId));
    isLocked = true;
    renderLockedPicker();
  }
  
  todayRecord = data;
  updateClockArea();
  loadMyRecords();
  
  // 토스트 메시지 (GPS 결과 반영)
  let toastMsg = `✅ 봉사 시작 — ${currentMember.name}`;
  if(gps?.success === true) toastMsg += ` · ${fmtDistance(gps.distance)}`;
  else if(gps?.tried === true && gps?.success === false) toastMsg += ` · GPS 미인증`;
  showToast(toastMsg);
}

// 봉사 종료
async function onEndClick(){
  if(!todayRecord || !todayRecord.check_in_at){
    showToast('아직 봉사를 시작하지 않았어요');
    return;
  }
  if(todayRecord.check_out_at){
    showToast('이미 종료된 봉사입니다');
    return;
  }
  
  // 종료 시점에도 같은 봉사 장소로 GPS 검증
  const location = allLocations.find(l => l.id === todayRecord.location_id);
  
  // 버튼 → "위치 확인 중..."
  const actions = document.getElementById('actions');
  actions.innerHTML = `<button class="btn-end" disabled>📡 위치 확인 중…</button>`;
  
  // GPS 측정
  const gps = location ? await verifyGPS(location) : 
    { tried: false, success: null, distance: null, accuracy: null, lat: null, lng: null, message: '봉사 장소 정보 없음' };
  
  // 시간 체크
  const now = new Date();
  const earlyEnd = needEndReason(now);
  
  // 사유 필요 여부
  const needReason = earlyEnd 
    || (gps.tried && gps.success === false) 
    || (gps.tried === false && gps.success === false);
  
  if(needReason){
    let title = '봉사 종료 사유 입력';
    let subLines = [];
    if(earlyEnd){
      subLines.push(`⏰ 기준 시각(${pad(WORK_END_HM.h)}:${pad(WORK_END_HM.m)}) 이전 종료`);
    }
    if(gps.tried && gps.success === false){
      subLines.push(`📍 ${gps.message} (수기 종료)`);
    } else if(gps.tried === false && gps.success === false){
      subLines.push(`📍 ${gps.message} (수기 종료)`);
    } else if(gps.tried && gps.success === true){
      subLines.push(`📍 ${gps.message}`);
    }
    openReasonModal('end', title, subLines.join('\n'), gps);
    return;
  }
  
  // 정상 — 즉시 종료
  await doEnd(null, gps);
}

async function doEnd(reason, gps){
  if(!todayRecord) return;
  const now = new Date();
  
  const updates = {
    check_out_at: now.toISOString(),
    check_out_reason: reason || null,
    // GPS 데이터 (있을 때만)
    check_out_lat:      gps?.lat ?? null,
    check_out_lng:      gps?.lng ?? null,
    check_out_distance: gps?.distance ?? null,
    check_out_accuracy: gps?.accuracy ?? null,
    gps_verified_out:   gps?.success === true,
  };
  
  const { data, error } = await sb
    .from('attend_records')
    .update(updates)
    .eq('id', todayRecord.id)
    .select('*, attend_locations(name)')
    .single();
  
  if(error){
    console.error('[doEnd]', error);
    showToast('봉사 종료 실패: ' + (error.message || '서버 오류'));
    updateClockArea();  // 버튼 복원
    return;
  }
  
  todayRecord = data;
  updateClockArea();
  loadMyRecords();
  
  let toastMsg = `✅ 봉사 종료 — ${currentMember.name}`;
  if(gps?.success === true) toastMsg += ` · ${fmtDistance(gps.distance)}`;
  else if(gps?.tried === true && gps?.success === false) toastMsg += ` · GPS 미인증`;
  showToast(toastMsg);
}

// ────────────────────────────────────────────────────────────
// 사유 모달
// ────────────────────────────────────────────────────────────
function openReasonModal(type, title, sub, gpsData){
  pendingReasonAction = { type, gps: gpsData || null };
  document.getElementById('reason-modal-title').textContent = title;
  // sub은 줄바꿈으로 여러 줄 가능
  const subEl = document.getElementById('reason-modal-sub');
  subEl.innerHTML = sub.split('\n').map(line => escapeHtml(line)).join('<br>');
  const input = document.getElementById('reason-input');
  input.value = '';
  document.getElementById('reason-confirm').disabled = true;
  document.getElementById('reason-modal-backdrop').classList.add('show');
  setTimeout(() => input.focus(), 100);
}

function closeReasonModal(){
  document.getElementById('reason-modal-backdrop').classList.remove('show');
  pendingReasonAction = null;
  // 모달 닫을 때 시계 영역 복원 (위치 확인 중... 상태였을 수 있음)
  updateClockArea();
}

function closeReasonModalIfBackdrop(e){
  if(e.target.id === 'reason-modal-backdrop') closeReasonModal();
}

function onReasonInput(){
  const v = document.getElementById('reason-input').value.trim();
  document.getElementById('reason-confirm').disabled = v.length === 0;
}

async function confirmReason(){
  const reason = document.getElementById('reason-input').value.trim();
  if(!reason || !pendingReasonAction){
    closeReasonModal();
    return;
  }
  const { type, gps } = pendingReasonAction;
  pendingReasonAction = null;
  document.getElementById('reason-modal-backdrop').classList.remove('show');
  if(type === 'start')    await doStart(reason, gps);
  else if(type === 'end') await doEnd(reason, gps);
}

// ────────────────────────────────────────────────────────────
// 사명자 잠금 (한 기기 한 사람)
// ────────────────────────────────────────────────────────────
function renderLockedPicker(){
  if(!isLocked || !currentMember) return;
  document.getElementById('picker-unlocked').style.display = 'none';
  document.getElementById('picker-locked').style.display = 'flex';
  const dept = DEPTS.find(d => d.id === currentMember.dept_id);
  document.getElementById('locked-who').textContent =
    `${currentMember.name} · ${currentMember.role || '—'}`;
  document.getElementById('locked-where').textContent =
    dept ? dept.name : currentMember.dept_id;
}

function renderUnlockedPicker(){
  document.getElementById('picker-unlocked').style.display = 'flex';
  document.getElementById('picker-locked').style.display = 'none';
}

function changeLockedMember(){
  if(!confirm('이 기기를 다른 사명자에게 양도하시겠어요?\n\n선택 정보가 초기화되고, 새 사명자를 선택하실 수 있습니다.')){
    return;
  }
  localStorage.removeItem(LS_KEY_MEMBER);
  localStorage.removeItem(LS_KEY_DEPT);
  // 장소는 유지 (기기 위치는 안 바뀌니까)
  isLocked = false;
  currentMemberId = null;
  currentMember = null;
  currentDeptId = '';
  todayRecord = null;
  renderUnlockedPicker();
  document.getElementById('sel-dept').value = '';
  document.getElementById('sel-member').innerHTML = '<option value="">먼저 부서 선택</option>';
  document.getElementById('sel-member').disabled = true;
  updateClockArea();
  renderEmptyRecords();
}

// 저장된 사명자 자동 복원
async function restoreSavedMember(){
  const savedId = localStorage.getItem(LS_KEY_MEMBER);
  const savedDept = localStorage.getItem(LS_KEY_DEPT);
  if(!savedId) return false;
  const member = allMembers.find(m => String(m.id) === savedId);
  if(!member){
    // 사명자가 삭제됐거나 없어진 경우
    localStorage.removeItem(LS_KEY_MEMBER);
    localStorage.removeItem(LS_KEY_DEPT);
    return false;
  }
  currentMember = member;
  currentMemberId = member.id;
  currentDeptId = savedDept || member.dept_id;
  isLocked = true;
  renderLockedPicker();
  await loadTodayRecord();
  await loadMyRecords();
  return true;
}

// ────────────────────────────────────────────────────────────
// 본인 기록
// ────────────────────────────────────────────────────────────
function renderEmptyRecords(){
  document.getElementById('record-meta').textContent = '—';
  document.getElementById('record-list').innerHTML = `
    <div class="empty">
      <div class="icon">📋</div>
      <div class="msg">사명자를 선택하면 기록이 보입니다</div>
      <div class="hint">부서 → 사명자 순으로 선택해주세요</div>
    </div>`;
}

async function loadMyRecords(){
  if(!currentMemberId) return;
  
  const container = document.getElementById('record-list');
  container.innerHTML = '<div class="loading"><span class="spinner"></span>불러오는 중…</div>';
  
  const since = new Date();
  since.setDate(since.getDate() - 14);
  
  const { data, error } = await sb
    .from('attend_records')
    .select('*, attend_locations(name)')
    .eq('member_id', currentMemberId)
    .gte('record_date', fmtYMD(since))
    .order('record_date', { ascending: false });
  
  if(error){
    console.error('[loadMyRecords]', error);
    container.innerHTML = `<div class="empty"><div class="msg">기록을 불러오지 못했어요</div><div class="hint">${escapeHtml(error.message)}</div></div>`;
    return;
  }
  
  if(!data || data.length === 0){
    document.getElementById('record-meta').textContent = '최근 14일 · 기록 없음';
    container.innerHTML = `
      <div class="empty">
        <div class="icon">📅</div>
        <div class="msg">아직 봉사 기록이 없어요</div>
        <div class="hint">첫 봉사를 시작해보세요</div>
      </div>`;
    return;
  }
  
  document.getElementById('record-meta').textContent = `최근 14일 · ${data.length}건`;
  
  const html = data.map(r => {
    const inDate  = r.check_in_at ? new Date(r.check_in_at) : null;
    const outDate = r.check_out_at ? new Date(r.check_out_at) : null;
    const timeText = inDate
      ? `${fmtHM(inDate)} – ${outDate ? fmtHM(outDate) : '진행 중'}`
      : '—';
    const duration = (inDate && outDate) ? fmtDuration(outDate - inDate) : '';
    
    // 상태 태그
    let tagHtml = '';
    if(!outDate && inDate) tagHtml = '<span class="tag working">봉사 중</span>';
    else if(outDate)       tagHtml = '<span class="tag done">종료</span>';
    
    // GPS 인증 칩 (시작·종료 각각)
    let gpsHtml = '';
    if(r.gps_verified === true){
      gpsHtml += `<span class="gps-chip ok" title="시작 GPS 인증${r.check_in_distance != null ? ' · ' + fmtDistance(r.check_in_distance) : ''}">📍시</span>`;
    } else if(r.check_in_at && r.gps_verified === false){
      gpsHtml += `<span class="gps-chip miss" title="시작 GPS 미인증">📍시</span>`;
    }
    if(r.check_out_at && r.gps_verified_out === true){
      gpsHtml += `<span class="gps-chip ok" title="종료 GPS 인증${r.check_out_distance != null ? ' · ' + fmtDistance(r.check_out_distance) : ''}">📍종</span>`;
    } else if(r.check_out_at && r.gps_verified_out === false){
      gpsHtml += `<span class="gps-chip miss" title="종료 GPS 미인증">📍종</span>`;
    }
    
    // 사유 표시 (있을 때만, 두 번째 줄)
    const reasons = [];
    if(r.check_in_reason)  reasons.push(`시작: ${r.check_in_reason}`);
    if(r.check_out_reason) reasons.push(`종료: ${r.check_out_reason}`);
    const reasonHtml = reasons.length > 0
      ? `<div class="history-reason">${escapeHtml(reasons.join(' / '))}</div>`
      : '';
    
    return `
      <div class="history-row-wrap">
        <div class="history-row">
          <span class="history-date">${fmtDateKor(r.record_date)}</span>
          <span class="history-time">${timeText}</span>
          ${gpsHtml}
          <span class="history-duration">${duration}</span>
          ${tagHtml}
        </div>
        ${reasonHtml}
      </div>`;
  }).join('');
  
  container.innerHTML = `<div class="history-list">${html}</div>`;
}

// ────────────────────────────────────────────────────────────
// 초기화
// ────────────────────────────────────────────────────────────
async function init(){
  setPageDate();
  startClock();
  await loadAllMembers();
  await loadAllLocations();
  // 저장된 사명자 자동 복원 (잠금 모드)
  const restored = await restoreSavedMember();
  if(!restored){
    renderUnlockedPicker();
  }
}

init();
</script>
