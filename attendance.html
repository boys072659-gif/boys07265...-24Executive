<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SJAMES 봉사 기록부</title>

<!-- Pretendard: Inter 같은 느낌의 한국 모던 폰트 -->
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  /* Design tokens — React 봉사 기록부 톤 그대로
     베이지 + 짙은 네이비 + 사프란 노랑, 모든 텍스트 산세리프 */
  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  :root {
    /* 배경 */
    --bg:          #FAF8F4;
    --bg-card:     #FFFFFF;
    --bg-subtle:   #F3F1EC;
    --bg-soft:     #FCFBF8;

    /* 본문 — 짙은 네이비 잉크 */
    --text:        #1C2333;
    --text-2:      #4B5468;
    --text-3:      #6B7280;
    --text-4:      #9CA3AF;
    --text-on-dark:#D7DCE5;
    --text-faint:  #9CA6BD;

    /* 경계선 */
    --border:      #E8E4DA;
    --border-2:    #EDE9DF;
    --border-3:    #E0DCD0;

    /* 강조 — 사프란 노랑 (Brand accent) */
    --action:      #E8A33D;
    --action-soft: #FBEED2;
    --action-deep: #C28525;

    /* 상태 */
    --ok:          #1C7C54;
    --ok-soft:     #E7F5EC;
    --late:        #D14343;
    --late-soft:   #FBEAEA;
    --absent:      #9CA3AF;
    --absent-soft: #F3F4F6;

    /* 폰트 */
    --font: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont,
            "Apple SD Gothic Neo", system-ui, sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    letter-spacing: -0.005em;
  }

  button, input, select {
    font-family: var(--font);
    font-size: 14px;
    color: var(--text);
  }

  /* ─── 상단바 ─── */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    background: #FFFFFF;
    position: sticky;
    top: 0;
    z-index: 10;
    flex-wrap: wrap;
    gap: 12px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .brand-mark {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: var(--text);              /* 짙은 네이비 */
    color: var(--action);                 /* 사프란 */
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 16px;
  }
  .brand-name .title {
    font-weight: 800;
    font-size: 16px;
    letter-spacing: -0.01em;
    color: var(--text);
  }
  .brand-name .sub {
    display: block;
    font-size: 12.5px;
    color: var(--text-3);
    margin-top: 1px;
  }

  /* 탭 (React 톤 — 배경 박스 + 활성 다크) */
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--bg-subtle);
    padding: 4px;
    border-radius: 10px;
  }
  .tab {
    border: none;
    background: transparent;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13.5px;
    font-weight: 600;
    color: var(--text-3);
    cursor: pointer;
  }
  .tab:hover { color: var(--text); }
  .tab.active {
    background: var(--text);
    color: #FFFFFF;
  }

  /* ─── 메인 ─── */
  .main {
    max-width: 720px;
    margin: 0 auto;
    padding: 28px 20px 60px;
  }

  /* 탭 패널 */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; animation: tabIn 0.2s; }
  @keyframes tabIn {
    from { opacity: 0; transform: translateY(2px); }
    to   { opacity: 1; transform: none; }
  }

  /* ─── 사명자 선택 줄 ─── */
  .picker-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
    font-size: 13px;
    flex-wrap: wrap;
  }
  .picker-label {
    color: var(--text-3);
  }
  .picker-row select {
    border: 1px solid var(--border-3);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 13.5px;
    background: #fff;
    color: var(--text);
    cursor: pointer;
  }
  .picker-row select:disabled {
    background: var(--bg-subtle);
    color: var(--text-3);
    cursor: not-allowed;
  }
  .picker-row select:focus {
    outline: none;
    border-color: var(--text);
  }

  /* ─── 시계 카드 — 시그니처 ─── */
  /* React 코드 그대로: 짙은 네이비 + 큰 시계 + 사프란 버튼 */
  .clock-card {
    background: var(--text);                /* 짙은 네이비 */
    border-radius: 20px;
    padding: 36px 28px;
    text-align: center;
    color: #FFFFFF;
    margin-bottom: 20px;
  }
  .clock-label {
    font-size: 12.5px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }
  .clock-display {
    font-size: 52px;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
    line-height: 1;
    margin-bottom: 18px;
  }
  .status-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 20px;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #D1D5DB;
    display: inline-block;
  }
  .status-dot.working { background: var(--action); }
  .status-dot.done    { background: #6B7280; }
  .status-text {
    font-size: 13.5px;
    color: var(--text-on-dark);
  }

  /* 버튼들 */
  .actions {
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .btn-start, .btn-end {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border: none;
    font-weight: 700;
    font-size: 15px;
    padding: 14px 36px;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.12s;
  }
  .btn-start {
    background: var(--action);
    color: var(--text);
  }
  .btn-start:hover:not(:disabled) {
    background: #F2B255;
  }
  .btn-start:disabled {
    background: #C9933F;
    opacity: 0.55;
    cursor: not-allowed;
  }
  .btn-end {
    background: transparent;
    color: #FFFFFF;
    border: 1.5px solid #4B5468;
  }
  .btn-end:hover {
    border-color: #7280A0;
    background: rgba(255,255,255,0.04);
  }

  .done-box {
    display: inline-block;
    font-size: 13.5px;
    color: var(--text-faint);
    border: 1px dashed #4B5468;
    border-radius: 10px;
    padding: 12px 18px;
  }

  /* ─── 카드 (기록) ─── */
  .card {
    background: #FFFFFF;
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
  }
  .card-heading {
    display: flex;
    align-items: center;
    gap: 7px;
    font-weight: 700;
    font-size: 14px;
    margin-bottom: 14px;
    color: var(--text);
  }
  .card-heading .meta {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-3);
    font-weight: 500;
    font-variant-numeric: tabular-nums;
  }

  /* 기록 행 */
  .history-list { display: flex; flex-direction: column; gap: 2px; }
  .history-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 0;
    border-bottom: 1px solid var(--bg-subtle);
    font-size: 13.5px;
  }
  .history-row:last-child { border-bottom: none; }
  .history-date {
    width: 84px;
    color: var(--text-3);
    font-weight: 500;
    font-variant-numeric: tabular-nums;
  }
  .history-time {
    flex: 1;
    font-variant-numeric: tabular-nums;
  }
  .history-duration {
    color: var(--text-3);
    font-variant-numeric: tabular-nums;
    font-size: 13px;
    min-width: 80px;
    text-align: right;
  }
  .tag {
    font-size: 11.5px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 6px;
    white-space: nowrap;
  }
  .tag.working { background: var(--action-soft); color: var(--action-deep); }
  .tag.done    { background: var(--absent-soft); color: var(--text-3); }
  .tag.late    { background: var(--late-soft); color: var(--late); }
  .tag.ok      { background: var(--ok-soft); color: var(--ok); }

  /* GPS 인증 칩 */
  .gps-chip {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 10.5px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 5px;
    white-space: nowrap;
  }
  .gps-chip.ok   { background: var(--ok-soft); color: var(--ok); }
  .gps-chip.miss { background: var(--absent-soft); color: var(--text-3); }

  /* 사유 (기록 행 아래 두 번째 줄) */
  .history-row-wrap {
    border-bottom: 1px solid var(--bg-subtle);
    padding: 10px 0;
  }
  .history-row-wrap:last-child { border-bottom: none; }
  .history-row-wrap .history-row {
    padding: 0;
    border-bottom: none;
  }
  .history-reason {
    margin-top: 5px;
    margin-left: 98px;
    font-size: 12px;
    color: var(--text-3);
    line-height: 1.4;
  }

  /* 빈 상태 */
  .empty {
    text-align: center;
    padding: 32px 20px;
    color: var(--text-3);
    font-size: 13.5px;
  }
  .empty .icon { font-size: 32px; opacity: 0.5; margin-bottom: 10px; }
  .empty .msg { font-weight: 600; color: var(--text-2); }
  .empty .hint { font-size: 12.5px; margin-top: 4px; color: var(--text-3); }

  /* 로딩 */
  .loading {
    text-align: center;
    padding: 28px 16px;
    color: var(--text-3);
    font-size: 13px;
  }
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid var(--border-3);
    border-top-color: var(--text);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
    vertical-align: -2px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 토스트 */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: var(--text);
    color: #FFFFFF;
    padding: 12px 18px;
    border-radius: 10px;
    font-size: 13.5px;
    font-weight: 500;
    opacity: 0;
    pointer-events: none;
    transition: all 0.2s;
    z-index: 1000;
    max-width: 86vw;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ─── 사유 입력 모달 ─── */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(28,35,51,0.55);
    backdrop-filter: blur(6px);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 500;
  }
  .modal-backdrop.show {
    display: flex;
    animation: fadeIn 0.18s;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .reason-modal {
    background: #FFFFFF;
    border-radius: 16px;
    width: 100%;
    max-width: 420px;
    overflow: hidden;
    box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    animation: modalIn 0.2s;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.96); }
    to   { opacity: 1; transform: none; }
  }
  .reason-modal-head {
    padding: 22px 24px 0;
  }
  .reason-modal-title {
    font-size: 17px;
    font-weight: 800;
    color: var(--text);
    margin: 0 0 6px;
    letter-spacing: -0.01em;
  }
  .reason-modal-sub {
    font-size: 13px;
    color: var(--text-3);
    margin: 0;
    line-height: 1.55;
  }
  .reason-modal-body {
    padding: 20px 24px;
  }
  .reason-modal-body label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-3);
    margin-bottom: 7px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .reason-modal-body textarea {
    width: 100%;
    min-height: 80px;
    padding: 11px 13px;
    border: 1px solid var(--border-3);
    border-radius: 10px;
    font-family: var(--font);
    font-size: 14px;
    color: var(--text);
    resize: vertical;
    line-height: 1.5;
  }
  .reason-modal-body textarea:focus {
    outline: none;
    border-color: var(--text);
  }
  .reason-modal-footer {
    padding: 14px 24px 20px;
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }
  .reason-modal-footer button {
    border: none;
    padding: 10px 18px;
    border-radius: 9px;
    font-weight: 700;
    cursor: pointer;
    font-size: 13.5px;
  }
  .reason-modal-footer .btn-cancel {
    background: var(--bg-subtle);
    color: var(--text-2);
  }
  .reason-modal-footer .btn-cancel:hover { background: var(--border-2); }
  .reason-modal-footer .btn-confirm {
    background: var(--text);
    color: #FFFFFF;
  }
  .reason-modal-footer .btn-confirm:hover { background: #2A3247; }
  .reason-modal-footer .btn-confirm:disabled {
    background: var(--text-4);
    cursor: not-allowed;
  }

  /* "본인 잠금" 안내 줄 */
  .locked-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
    padding: 12px 16px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 13.5px;
  }
  .locked-row .lock-icon {
    width: 28px; height: 28px;
    border-radius: 7px;
    background: var(--action-soft);
    color: var(--action-deep);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 800;
    flex-shrink: 0;
  }
  .locked-row .lock-info {
    flex: 1;
    line-height: 1.3;
  }
  .locked-row .lock-info .who {
    font-weight: 700;
    color: var(--text);
  }
  .locked-row .lock-info .where {
    color: var(--text-3);
    font-size: 12.5px;
    margin-top: 2px;
  }
  .locked-row .lock-change {
    background: transparent;
    border: 1px solid var(--border-3);
    color: var(--text-3);
    padding: 6px 11px;
    border-radius: 7px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
  }
  .locked-row .lock-change:hover {
    border-color: var(--text-3);
    color: var(--text);
  }

  /* 봉사 장소 선택 줄 */
  .loc-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    font-size: 13px;
    color: var(--text-3);
    justify-content: center;
  }
  .loc-row select {
    border: 1px solid #4B5468;
    background: #2A3247;
    color: #FFFFFF;
    border-radius: 8px;
    padding: 7px 11px;
    font-size: 13px;
    cursor: pointer;
  }
  .loc-row select:focus { outline: none; border-color: #7280A0; }
  .loc-gps-hint {
    font-size: 11.5px;
    color: var(--text-faint);
    font-weight: 500;
  }
  .loc-gps-hint.on { color: var(--action); }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  /* 관리자 모드 */
  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  
  /* 로그인 카드 */
  .admin-login {
    display: flex;
    justify-content: center;
    padding: 40px 20px;
  }
  .admin-login-card {
    background: #FFFFFF;
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px 28px 28px;
    width: 100%;
    max-width: 360px;
    text-align: center;
    box-shadow: 0 2px 12px rgba(28,35,51,0.05);
  }
  .admin-login-mark {
    width: 56px;
    height: 56px;
    border-radius: 14px;
    background: var(--text);
    color: var(--action);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    margin: 0 auto 16px;
  }
  .admin-login-title {
    font-size: 19px;
    font-weight: 800;
    color: var(--text);
    margin: 0 0 6px;
    letter-spacing: -0.01em;
  }
  .admin-login-sub {
    font-size: 13px;
    color: var(--text-3);
    margin: 0 0 22px;
  }
  .admin-login-input {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--border-3);
    border-radius: 10px;
    font-size: 14px;
    margin-bottom: 12px;
    box-sizing: border-box;
  }
  .admin-login-input:focus {
    outline: none;
    border-color: var(--text);
  }
  .admin-login-remember {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 13px;
    color: var(--text-3);
    margin-bottom: 16px;
    cursor: pointer;
    user-select: none;
  }
  .admin-login-btn {
    width: 100%;
    background: var(--text);
    color: #FFFFFF;
    border: none;
    padding: 13px;
    border-radius: 10px;
    font-size: 14.5px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
  }
  .admin-login-btn:hover { background: #2A3247; }
  .admin-login-err {
    margin-top: 12px;
    color: var(--late);
    font-size: 12.5px;
    min-height: 16px;
  }

  /* 관리자 상단 액션 */
  .admin-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--text);
    color: #FFFFFF;
    border-radius: 12px;
    margin-bottom: 18px;
  }
  .admin-toolbar-label {
    font-size: 13.5px;
    font-weight: 700;
  }
  .admin-logout-btn {
    background: rgba(255,255,255,0.08);
    color: #FFFFFF;
    border: 1px solid rgba(255,255,255,0.18);
    padding: 6px 12px;
    border-radius: 7px;
    font-size: 12px;
    cursor: pointer;
  }
  .admin-logout-btn:hover { background: rgba(255,255,255,0.14); }

  /* KPI 카드 */
  .admin-kpi-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 18px;
  }
  .admin-kpi-card {
    background: #FFFFFF;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
  }
  .admin-kpi-card .k-label {
    font-size: 11px;
    color: var(--text-3);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
  }
  .admin-kpi-card .k-value {
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .admin-kpi-card .k-meta {
    font-size: 11px;
    color: var(--text-4);
    margin-top: 4px;
  }
  .admin-kpi-card.working .k-value { color: var(--action-deep); }
  .admin-kpi-card.absent .k-value { color: var(--text-3); }

  /* 필터 */
  .admin-filter {
    display: flex;
    align-items: end;
    gap: 10px;
    padding: 12px 16px;
    background: #FFFFFF;
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .admin-filter-field {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
    min-width: 130px;
  }
  .admin-filter-field label {
    font-size: 10.5px;
    font-weight: 700;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .admin-filter select {
    padding: 8px 10px;
    border: 1px solid var(--border-3);
    border-radius: 7px;
    font-size: 13px;
    background: #FFFFFF;
    cursor: pointer;
  }
  .admin-refresh-btn {
    background: var(--bg-subtle);
    color: var(--text-2);
    border: 1px solid var(--border-3);
    padding: 8px 14px;
    border-radius: 7px;
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  .admin-refresh-btn:hover { background: var(--border-2); }

  /* 표 */
  .admin-table-card {
    background: #FFFFFF;

  }
  .admin-table-head {

    gap: 8px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-soft);

  .admin-table-head h3 {
    font-size: 14.5px;
    font-weight: 700;
    margin: 0;
    color: var(--text);
  }
  .admin-table-meta {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-3);
    font-variant-numeric: tabular-nums;
  }

  .admin-table-row {
    display: grid;
    grid-template-columns: 2fr 1.4fr 1fr 1fr 1fr 0.6fr 0.7fr;
    gap: 8px;
    padding: 11px 16px;
    border-bottom: 1px solid var(--bg-subtle);
    font-size: 13px;
    align-items: center;
  }
  .admin-table-row:last-child { border-bottom: none; }
  .admin-table-row.head {
    background: #FFFFFF;
    border-bottom: 1px solid var(--border);
    font-size: 10.5px;
    font-weight: 700;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 9px 16px;
  }
  .admin-table-row .col-name {
    font-weight: 700;
    color: var(--text);
  }
  .admin-table-row .col-role {
    color: var(--text-3);
    font-size: 12px;
  }
  .admin-table-row .col-dept {
    color: var(--text-3);
    font-size: 12.5px;
  }
  .admin-table-row .col-time {
    font-variant-numeric: tabular-nums;
    color: var(--text-2);
  }
  .admin-table-row .col-dur {
    font-variant-numeric: tabular-nums;
    color: var(--text-3);
    font-size: 12px;
  }

  /* 반응형 — 관리자 */
  @media (max-width: 720px) {
    .admin-kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .admin-table-row {
      grid-template-columns: 1.4fr 0.9fr 0.9fr 0.7fr;
      font-size: 12.5px;
      gap: 6px;
    }
    .admin-table-row .col-dept,

  /* ─── 관리자 서브 탭 ─── */

    gap: 6px;

  .admin-subtab {
    background: transparent;
    border: none;
    padding: 10px 14px 12px;

  .admin-subtab.active {

  .admin-sub-panel { display: none; }
  .admin-sub-panel.active { display: block; animation: tabIn 0.18s; }

  /* ─── 사명자 추가 폼 ─── */
  .admin-add-card {
    background: #FFFFFF;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .admin-add-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 10px;
  }
  .admin-add-row {
    display: grid;
    grid-template-columns: 1.3fr 1fr 0.9fr 1.2fr auto;
    gap: 8px;
    align-items: center;
  }
  .add-input {
    padding: 9px 11px;
    border: 1px solid var(--border-3);
    border-radius: 8px;
    font-size: 13px;
    background: #FFFFFF;
    font-family: var(--font);
    color: var(--text);
  }
  .add-input:focus {
    outline: none;
    border-color: var(--text);
  }
  .add-btn {
    background: var(--action);
    color: var(--text);
    border: none;
    padding: 9px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
  }
  .add-btn:hover { background: #F2B255; }
  .admin-add-err {
    margin-top: 8px;
    font-size: 12px;
    color: var(--late);
    min-height: 14px;
  }

  /* ─── 사명자 표 행 ─── */
  .members-row {
    display: grid;
    grid-template-columns: 1.4fr 1.6fr 0.8fr 1.2fr 0.7fr 0.7fr;

    border-bottom: 1px solid var(--bg-subtle);
    font-size: 13px;
    align-items: center;

  .members-row:last-child { border-bottom: none; }
  .members-row.head {
    background: #FFFFFF;
    border-bottom: 1px solid var(--border);
    font-size: 10.5px;
    font-weight: 700;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 9px 16px;

  .members-row .col-name {
    font-weight: 700;
    color: var(--text);
  }
  .members-row.inactive {
    opacity: 0.5;
    background: var(--bg-subtle);
  }
  .members-row .col-phone {
    color: var(--text-3);
    font-size: 12.5px;
    font-variant-numeric: tabular-nums;
  }
  .row-action {
    background: transparent;
    border: 1px solid var(--border-3);
    color: var(--text-2);
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 11.5px;
    font-weight: 600;
    cursor: pointer;
  }
  .row-action:hover {
    border-color: var(--text-3);
    color: var(--text);
  }
  .row-action.danger {
    color: var(--late);
    border-color: #F0C0BD;
  }
  .row-action.danger:hover {
    background: var(--late-soft);
  }
  .row-action.ok {
    color: var(--ok);
    border-color: #BBE0C8;
  }

  /* 반응형 사명자 표 */
  @media (max-width: 720px) {
    .admin-add-row {
      grid-template-columns: 1fr 1fr;
    }
    .add-btn { grid-column: span 2; }
    .members-row {
      grid-template-columns: 1.2fr 1fr 0.8fr;
      font-size: 12.5px;
    }
    .members-row .col-phone,
    .members-row .col-edit,

  /* 관리자 탭 placeholder (장소 임시) */

    font-size: 15px;

    color: var(--text-2);
  }

    margin-top: 6px;
    font-size: 12.5px;
    color: var(--text-3);
  }

  /* 반응형 */
  @media (max-width: 640px) {
    .topbar { padding: 16px 18px; }
    .main { padding: 20px 14px 50px; }
    .clock-card { padding: 28px 20px 24px; border-radius: 16px; }

<body>

<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<!-- 상단바 -->
<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<header class="topbar">
  <div class="brand">
    <div class="brand-mark">봉</div>
    <div class="brand-name">
      <div class="title">봉사 기록부</div>
      <span class="sub" id="page-date">—</span>
    </div>
  </div>
  <nav class="tabs">
    <button class="tab active" data-tab="member" onclick="switchTab('member')">내 봉사</button>
    <button class="tab" data-tab="admin" onclick="switchTab('admin')">관리자</button>
  </nav>
</header>

<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<!-- 메인 -->
<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<main class="main">

  <!-- ━━━ 탭 1: 내 봉사 ━━━ -->
  <div id="tab-member" class="tab-panel active">

    <!-- A) 잠금 전 — 부서·사명자 선택 -->
    <div class="picker-row" id="picker-unlocked">
      <span class="picker-label">부서</span>
      <select id="sel-dept" onchange="onDeptChange()">
        <option value="">부서 선택…</option>
      </select>
      <span class="picker-label">사명자</span>
      <select id="sel-member" disabled onchange="onMemberChange()">
        <option value="">먼저 부서 선택</option>
      </select>
    </div>

    <!-- B) 잠금 후 — "○○○님 기기" 표시 + 변경 -->
    <div class="locked-row" id="picker-locked" style="display:none">
      <div class="lock-icon">✓</div>
      <div class="lock-info">
        <div class="who" id="locked-who">—</div>
        <div class="where" id="locked-where">—</div>
      </div>
      <button class="lock-change" onclick="changeLockedMember()" title="다른 사명자로 변경">
        변경
      </button>
    </div>

    <!-- 시계 카드 -->
    <div class="clock-card">
      <div class="clock-label">현재 시각</div>
      <div class="clock-display" id="clock-display">—:—:—</div>
      <div class="status-row">
        <span class="status-dot" id="status-dot"></span>
        <span class="status-text" id="status-text">사명자를 선택해주세요</span>
      </div>
      <!-- 봉사 장소 (시작 전에만 보임) -->
      <div class="loc-row" id="loc-row" style="display:none">
        <span>봉사 장소</span>
        <select id="sel-location" onchange="onLocationChange()"></select>
        <span class="loc-gps-hint" id="loc-gps-hint"></span>
      </div>
      <div class="actions" id="actions">
        <button class="btn-start" id="btn-start" onclick="onStartClick()" disabled>
          봉사 시작
        </button>
      </div>
    </div>

    <!-- 본인 누적 기록 -->
    <div class="card">
      <div class="card-heading">
        📋 최근 봉사 기록
        <span class="meta" id="record-meta">—</span>
      </div>
      <div id="record-list">
        <div class="empty">
          <div class="icon">📋</div>
          <div class="msg">사명자를 선택하면 기록이 보입니다</div>
          <div class="hint">부서 → 사명자 순으로 선택해주세요</div>
        </div>
      </div>
    </div>

  </div><!-- /tab-member -->

  <!-- ━━━ 탭 2: 관리자 ━━━ -->
  <div id="tab-admin" class="tab-panel">

    <!-- A) 로그인 화면 -->
    <div id="admin-login" class="admin-login">
      <div class="admin-login-card">
        <div class="admin-login-mark">🔑</div>
        <h2 class="admin-login-title">관리자 로그인</h2>
        <p class="admin-login-sub">총무부 마스터 비밀번호로 접속하세요</p>
        <input type="password" id="admin-pw" class="admin-login-input"
               placeholder="비밀번호" autocomplete="current-password">
        <label class="admin-login-remember">
          <input type="checkbox" id="admin-remember">
          이 기기에서 자동 로그인
        </label>
        <button class="admin-login-btn" onclick="doAdminLogin()">로그인</button>
        <div class="admin-login-err" id="admin-login-err"></div>
      </div>
    </div>

    <!-- B) 관리자 메인 (로그인 후) -->
    <div id="admin-main" style="display:none">
      <!-- 상단 액션 줄 -->
      <div class="admin-toolbar">
        <span class="admin-toolbar-label">🔑 관리자</span>
        <button class="admin-logout-btn" onclick="doAdminLogout()">로그아웃</button>
      </div>

      <!-- 서브 탭 -->
      <div class="admin-subtabs">
        <button class="admin-subtab active" data-subtab="today" onclick="switchAdminSubtab('today')">📋 오늘 현황</button>
        <button class="admin-subtab" data-subtab="members" onclick="switchAdminSubtab('members')">👥 사명자 관리</button>
        <button class="admin-subtab" data-subtab="locations" onclick="switchAdminSubtab('locations')">📍 봉사 장소</button>
      </div>

      <!-- ━━ 서브 탭 1: 오늘 현황 ━━ -->
      <div id="admin-sub-today" class="admin-sub-panel active">
        <!-- KPI 4개 -->
        <div class="admin-kpi-grid" id="admin-kpi"></div>

        <!-- 필터 -->
        <div class="admin-filter">
          <div class="admin-filter-field">
            <label>부서</label>
            <select id="admin-f-dept" onchange="renderAdminToday()">
              <option value="">전체 부서</option>
            </select>
          </div>
          <div class="admin-filter-field">
            <label>상태</label>
            <select id="admin-f-status" onchange="renderAdminToday()">
              <option value="">전체</option>
              <option value="working">봉사 중</option>
              <option value="done">종료</option>
              <option value="none">미시작</option>
            </select>
          </div>
          <button class="admin-refresh-btn" onclick="loadAdminToday()" title="새로고침">
            ↻ 새로고침
          </button>
        </div>

        <!-- 오늘 현황 표 -->
        <div class="admin-table-card">
          <div class="admin-table-head">
            <h3>오늘 현황</h3>
            <span class="admin-table-meta" id="admin-table-meta">—</span>
          </div>
          <div id="admin-today-list">
            <div class="loading"><span class="spinner"></span>불러오는 중…</div>
          </div>
        </div>
      </div>

      <!-- ━━ 서브 탭 2: 사명자 관리 ━━ -->
      <div id="admin-sub-members" class="admin-sub-panel">
        <!-- 사명자 추가 폼 -->
        <div class="admin-add-card">
          <div class="admin-add-title">사명자 추가</div>
          <div class="admin-add-row">
            <select id="add-mem-dept" class="add-input">
              <option value="">부서 선택…</option>
            </select>
            <input id="add-mem-name" class="add-input" placeholder="이름" maxlength="20">
            <select id="add-mem-role" class="add-input">
              <option value="부장">부장</option>
              <option value="과장">과장</option>
              <option value="서무">서무</option>
              <option value="총무">총무</option>
              <option value="회원">회원</option>
              <option value="기타">기타</option>
            </select>
            <input id="add-mem-phone" class="add-input" placeholder="연락처 (선택)" maxlength="20">
            <button class="add-btn" onclick="onAddMember()">+ 추가</button>
          </div>
          <div class="admin-add-err" id="add-mem-err"></div>
        </div>

        <!-- 사명자 필터 -->
        <div class="admin-filter">
          <div class="admin-filter-field">
            <label>부서</label>
            <select id="mem-f-dept" onchange="renderMembers()">
              <option value="">전체 부서</option>
            </select>
          </div>
          <div class="admin-filter-field">
            <label>상태</label>
            <select id="mem-f-status" onchange="renderMembers()">
              <option value="active">활성</option>
              <option value="all">전체 (비활성 포함)</option>
              <option value="inactive">비활성만</option>
            </select>
          </div>
          <button class="admin-refresh-btn" onclick="loadAllMembersAdmin()" title="새로고침">↻ 새로고침</button>
        </div>

        <!-- 사명자 표 -->
        <div class="admin-table-card">
          <div class="admin-table-head">
            <h3>사명자 명단</h3>
            <span class="admin-table-meta" id="members-meta">—</span>
          </div>
          <div id="members-list">
            <div class="loading"><span class="spinner"></span>불러오는 중…</div>
          </div>
        </div>
      </div>

      <!-- ━━ 서브 탭 3: 봉사 장소 (2-4-C에서 채움) ━━ -->
      <div id="admin-sub-locations" class="admin-sub-panel">
        <div class="admin-placeholder">
          <div class="ph-icon">📍</div>
          <div class="ph-msg">봉사 장소 관리는 다음 단계에서 추가됩니다</div>
          <div class="ph-hint">좌표 설정 · 반경 · "현재 위치로 설정"</div>
        </div>
      </div>

    </div>

  </div>

</main>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<!-- ━━━ 사유 입력 모달 ━━━ -->
<div class="modal-backdrop" id="reason-modal-backdrop" onclick="closeReasonModalIfBackdrop(event)">
  <div class="reason-modal" onclick="event.stopPropagation()">
    <div class="reason-modal-head">
      <h3 class="reason-modal-title" id="reason-modal-title">사유 입력</h3>
      <p class="reason-modal-sub" id="reason-modal-sub">—</p>
    </div>
    <div class="reason-modal-body">
      <label for="reason-input">사유 (필수)</label>
      <textarea id="reason-input" placeholder="예: 외부 일정으로 늦게 시작합니다 / 개인 사정으로 조퇴" oninput="onReasonInput()"></textarea>
    </div>
    <div class="reason-modal-footer">
      <button class="btn-cancel" onclick="closeReasonModal()">취소</button>
      <button class="btn-confirm" id="reason-confirm" onclick="confirmReason()" disabled>확인</button>
    </div>
  </div>
</div>

function pad(n){ return String(n).padStart(2,'0'); }
function fmtTime(d){ return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`; }
function fmtHM(d){ return `${pad(d.getHours())}:${pad(d.getMinutes())}`; }
function fmtYMD(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function fmtDuration(ms){
  if(!ms || ms < 0) return '—';
  const totalMin = Math.floor(ms / 60000);
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  return `${h}시간 ${pad(m)}분`;
}
function fmtDateKor(dateStr){
  const d = new Date(dateStr);
  const weekday = ['일','월','화','수','목','금','토'][d.getDay()];
  return `${pad(d.getMonth()+1)}.${pad(d.getDate())} (${weekday})`;
}
function fmtDateLong(d){
  const weekday = ['일','월','화','수','목','금','토'][d.getDay()];
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${weekday})`;
}
function escapeHtml(s){
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

// ────────────────────────────────────────────────────────────
// GPS 유틸
// ────────────────────────────────────────────────────────────
function haversineDistance(lat1, lng1, lat2, lng2){
  const R = 6371000;  // 지구 반지름 (m)
  const toRad = x => (x * Math.PI) / 180;
  const dLat = toRad(lat2 - lat1);
  const dLng = toRad(lng2 - lng1);
  const a =
    Math.sin(dLat/2) ** 2 +
    Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function fmtDistance(m){
  if(m == null) return '—';
  if(m < 1000) return `${Math.round(m)}m`;
  return `${(m/1000).toFixed(2)}km`;
}

function getCurrentPosition(){
  return new Promise((resolve, reject) => {
    if(!('geolocation' in navigator)){
      reject({ code: -1, message: '이 브라우저는 위치 기능을 지원하지 않습니다' });
      return;
    }
    navigator.geolocation.getCurrentPosition(
      pos => resolve({
        lat: pos.coords.latitude,
        lng: pos.coords.longitude,
        accuracy: pos.coords.accuracy,
      }),
      err => reject(err),
      { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
    );
  });
}

function gpsErrorText(err){
  if(!err) return '위치를 확인할 수 없습니다';
  if(err.code === 1) return '위치 권한이 거부되었습니다';
  if(err.code === 2) return '위치 정보를 가져올 수 없습니다';
  if(err.code === 3) return '위치 확인 시간 초과';
  return err.message || '위치를 확인할 수 없습니다';
}

// 봉사 장소에 대한 GPS 검증
// 결과: { tried, success, distance, accuracy, lat, lng, message }
async function verifyGPS(location){
  if(!location || !location.gps_enabled){
    return { tried: false, success: null, distance: null, accuracy: null,
             lat: null, lng: null, message: '이 장소는 위치 확인을 사용하지 않습니다' };
  }
  if(location.lat == null || location.lng == null){
    return { tried: false, success: false, distance: null, accuracy: null,
             lat: null, lng: null, message: '봉사 장소에 기준 좌표가 없습니다 (관리자에 문의)' };
  }
  try {
    const fix = await getCurrentPosition();
    const distance = haversineDistance(fix.lat, fix.lng, location.lat, location.lng);
    const radius = Number(location.radius || 100);
    const within = distance <= radius;
    return {
      tried: true,
      success: within,
      distance: Math.round(distance),
      accuracy: Math.round(fix.accuracy),
      lat: fix.lat,
      lng: fix.lng,
      message: within
        ? `위치 확인됨 · ${fmtDistance(distance)} (허용 ${radius}m)`
        : `봉사 장소에서 ${fmtDistance(distance)} 떨어져 있음 (허용 ${radius}m)`,
    };
  } catch(err) {
    return {
      tried: true,
      success: false,
      distance: null,
      accuracy: null,
      lat: null,
      lng: null,
      message: gpsErrorText(err),
    };
  }
}

function isLate(iso, workStart=9){
  const d = new Date(iso);
  return d.getHours() > workStart || (d.getHours() === workStart && d.getMinutes() > 0);
}
function showToast(msg, duration=2500){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => t.classList.remove('show'), duration);
}

function updateClockArea(){
  const statusText = document.getElementById('status-text');
  const statusDot  = document.getElementById('status-dot');
  const actions    = document.getElementById('actions');
  const locRow     = document.getElementById('loc-row');
  
  if(!currentMember){

  }
  
  // 오늘 기록 상태별로 UI 분기
  if(!todayRecord){
    // 아직 시작 안 함
    statusText.textContent = `${currentMember.name} · ${currentMember.role || '—'} · 아직 봉사 시작 전`;
    statusDot.className = 'status-dot';
    actions.innerHTML = `<button class="btn-start" id="btn-start" onclick="onStartClick()">봉사 시작</button>`;
    locRow.style.display = 'flex';
  } else if(todayRecord.check_in_at && !todayRecord.check_out_at){
    // 봉사 중
    const inHM = fmtHM(new Date(todayRecord.check_in_at));
    const locName = todayRecord.attend_locations?.name || '—';
    statusText.textContent = `봉사 중 · ${inHM} 시작 · ${locName}`;
    statusDot.className = 'status-dot working';
    actions.innerHTML = `<button class="btn-end" id="btn-end" onclick="onEndClick()">봉사 종료</button>`;
    locRow.style.display = 'none';
  } else if(todayRecord.check_in_at && todayRecord.check_out_at){
    // 종료 완료
    const dur = fmtDuration(new Date(todayRecord.check_out_at) - new Date(todayRecord.check_in_at));
    statusText.textContent = `오늘 봉사 종료 · ${dur} 봉사`;
    statusDot.className = 'status-dot done';
    actions.innerHTML = `<div class="done-box">오늘 봉사가 종료되었습니다. 수고하셨습니다.</div>`;
    locRow.style.display = 'none';
  }
}

// 시각이 사유 필요한 시간인지 확인
function needStartReason(now){
  const startMin = WORK_START_HM.h * 60 + WORK_START_HM.m;  // 08:40 → 520
  const nowMin = now.getHours() * 60 + now.getMinutes();
  return nowMin > startMin;
}
function needEndReason(now){
  const endMin = WORK_END_HM.h * 60 + WORK_END_HM.m;        // 20:00 → 1200
  const nowMin = now.getHours() * 60 + now.getMinutes();
  return nowMin < endMin;
}

// 봉사 시작
async function onStartClick(){
  if(!currentMember || !currentLocationId){
    showToast('사명자와 봉사 장소를 선택해주세요');
    return;
  }
  const location = allLocations.find(l => l.id === currentLocationId);
  if(!location){
    showToast('봉사 장소를 찾을 수 없어요');
    return;
  }
  
  // 시작 버튼을 "위치 확인 중..."으로
  const actions = document.getElementById('actions');
  actions.innerHTML = `<button class="btn-start" disabled>📡 위치 확인 중…</button>`;
  
  // GPS 측정
  const gps = await verifyGPS(location);
  
  // 시간 체크
  const now = new Date();
  const lateStart = needStartReason(now);
  
  // 사유 필요 여부 결정
  // (가) 늦은 시작 → 무조건 사유
  // (나) GPS 미인증(권한 거부·거리 초과·좌표 없음) → 사유
  const needReason = lateStart || (gps.tried && gps.success === false) || (gps.tried === false && gps.success === false);
  
  if(needReason){
    // 사유 모달 (GPS 결과 + 시간 정보 함께 표시)
    let title = '봉사 시작 사유 입력';
    let subLines = [];
    if(lateStart){
      subLines.push(`⏰ 기준 시각(${pad(WORK_START_HM.h)}:${pad(WORK_START_HM.m)}) 이후 시작`);
    }
    if(gps.tried && gps.success === false){
      subLines.push(`📍 ${gps.message}`);
    } else if(gps.tried === false && gps.success === false){
      subLines.push(`📍 ${gps.message}`);
    } else if(gps.tried && gps.success === true){
      subLines.push(`📍 ${gps.message}`);
    }
    openReasonModal('start', title, subLines.join('\n'), gps);
    return;
  }
  
  // 정상 — 즉시 시작
  await doStart(null, gps);
}

// 실제 시작 처리
async function doStart(reason, gps){
  if(!currentMember || !currentLocationId){
    showToast('사명자와 봉사 장소를 선택해주세요');
    return;
  }
  const now = new Date();
  const today = fmtYMD(now);
  
  const row = {
    member_id:    currentMemberId,
    location_id:  currentLocationId,
    record_date:  today,
    check_in_at:  now.toISOString(),
    check_in_reason: reason || null,
    // GPS 데이터 (있을 때만)
    check_in_lat:      gps?.lat ?? null,
    check_in_lng:      gps?.lng ?? null,
    check_in_distance: gps?.distance ?? null,
    check_in_accuracy: gps?.accuracy ?? null,
    gps_verified:      gps?.success === true,
  };
  
  const { data, error } = await sb
    .from('attend_records')
    .insert(row)
    .select('*, attend_locations(name)')
    .single();
  
  if(error){
    if(error.code === '23505'){
      showToast('오늘 이미 봉사를 시작하셨어요. 새로고침 후 확인해주세요');
      loadTodayRecord();
    } else {
      console.error('[doStart]', error);
      showToast('봉사 시작 실패: ' + (error.message || '서버 오류'));
    }
    updateClockArea();  // 버튼 복원
    return;
  }
  
  // 사명자 잠금
  if(!isLocked){
    localStorage.setItem(LS_KEY_MEMBER, String(currentMemberId));
    localStorage.setItem(LS_KEY_DEPT,   currentDeptId);
    localStorage.setItem(LS_KEY_LOC,    String(currentLocationId));
    isLocked = true;
    renderLockedPicker();
  }
  
  todayRecord = data;
  updateClockArea();
  loadMyRecords();
  
  // 토스트 메시지 (GPS 결과 반영)
  let toastMsg = `✅ 봉사 시작 — ${currentMember.name}`;
  if(gps?.success === true) toastMsg += ` · ${fmtDistance(gps.distance)}`;
  else if(gps?.tried === true && gps?.success === false) toastMsg += ` · GPS 미인증`;
  showToast(toastMsg);
}

// 봉사 종료
async function onEndClick(){
  if(!todayRecord || !todayRecord.check_in_at){
    showToast('아직 봉사를 시작하지 않았어요');
    return;
  }
  if(todayRecord.check_out_at){
    showToast('이미 종료된 봉사입니다');
    return;
  }
  
  // 종료 시점에도 같은 봉사 장소로 GPS 검증
  const location = allLocations.find(l => l.id === todayRecord.location_id);
  
  // 버튼 → "위치 확인 중..."
  const actions = document.getElementById('actions');
  actions.innerHTML = `<button class="btn-end" disabled>📡 위치 확인 중…</button>`;
  
  // GPS 측정
  const gps = location ? await verifyGPS(location) : 
    { tried: false, success: null, distance: null, accuracy: null, lat: null, lng: null, message: '봉사 장소 정보 없음' };
  
  // 시간 체크
  const now = new Date();
  const earlyEnd = needEndReason(now);
  
  // 사유 필요 여부
  const needReason = earlyEnd 
    || (gps.tried && gps.success === false) 
    || (gps.tried === false && gps.success === false);
  
  if(needReason){
    let title = '봉사 종료 사유 입력';
    let subLines = [];
    if(earlyEnd){
      subLines.push(`⏰ 기준 시각(${pad(WORK_END_HM.h)}:${pad(WORK_END_HM.m)}) 이전 종료`);
    }
    if(gps.tried && gps.success === false){
      subLines.push(`📍 ${gps.message} (수기 종료)`);
    } else if(gps.tried === false && gps.success === false){
      subLines.push(`📍 ${gps.message} (수기 종료)`);
    } else if(gps.tried && gps.success === true){
      subLines.push(`📍 ${gps.message}`);
    }
    openReasonModal('end', title, subLines.join('\n'), gps);
    return;
  }
  
  // 정상 — 즉시 종료
  await doEnd(null, gps);
}

async function doEnd(reason, gps){
  if(!todayRecord) return;
  const now = new Date();
  
  const updates = {
    check_out_at: now.toISOString(),
    check_out_reason: reason || null,
    // GPS 데이터 (있을 때만)
    check_out_lat:      gps?.lat ?? null,
    check_out_lng:      gps?.lng ?? null,
    check_out_distance: gps?.distance ?? null,
    check_out_accuracy: gps?.accuracy ?? null,
    gps_verified_out:   gps?.success === true,
  };
  
  const { data, error } = await sb
    .from('attend_records')
    .update(updates)
    .eq('id', todayRecord.id)
    .select('*, attend_locations(name)')
    .single();
  
  if(error){
    console.error('[doEnd]', error);
    showToast('봉사 종료 실패: ' + (error.message || '서버 오류'));
    updateClockArea();  // 버튼 복원
    return;
  }
  
  todayRecord = data;
  updateClockArea();
  loadMyRecords();
  
  let toastMsg = `✅ 봉사 종료 — ${currentMember.name}`;
  if(gps?.success === true) toastMsg += ` · ${fmtDistance(gps.distance)}`;
  else if(gps?.tried === true && gps?.success === false) toastMsg += ` · GPS 미인증`;
  showToast(toastMsg);
}

function openReasonModal(type, title, sub, gpsData){
  pendingReasonAction = { type, gps: gpsData || null };
  document.getElementById('reason-modal-title').textContent = title;
  // sub은 줄바꿈으로 여러 줄 가능
  const subEl = document.getElementById('reason-modal-sub');
  subEl.innerHTML = sub.split('\n').map(line => escapeHtml(line)).join('<br>');
  const input = document.getElementById('reason-input');
  input.value = '';
  document.getElementById('reason-confirm').disabled = true;
  document.getElementById('reason-modal-backdrop').classList.add('show');
  setTimeout(() => input.focus(), 100);
}

function closeReasonModal(){
  document.getElementById('reason-modal-backdrop').classList.remove('show');
  pendingReasonAction = null;
  // 모달 닫을 때 시계 영역 복원 (위치 확인 중... 상태였을 수 있음)
  updateClockArea();
}

function closeReasonModalIfBackdrop(e){
  if(e.target.id === 'reason-modal-backdrop') closeReasonModal();
}

function onReasonInput(){
  const v = document.getElementById('reason-input').value.trim();
  document.getElementById('reason-confirm').disabled = v.length === 0;
}

async function confirmReason(){
  const reason = document.getElementById('reason-input').value.trim();
  if(!reason || !pendingReasonAction){
    closeReasonModal();
    return;
  }
  const { type, gps } = pendingReasonAction;
  pendingReasonAction = null;
  document.getElementById('reason-modal-backdrop').classList.remove('show');
  if(type === 'start')    await doStart(reason, gps);
  else if(type === 'end') await doEnd(reason, gps);
}

async function loadMyRecords(){
  if(!currentMemberId) return;
  
  const container = document.getElementById('record-list');
  container.innerHTML = '<div class="loading"><span class="spinner"></span>불러오는 중…</div>';
  
  const since = new Date();
  since.setDate(since.getDate() - 14);
  
  const { data, error } = await sb
    .from('attend_records')
    .select('*, attend_locations(name)')
    .eq('member_id', currentMemberId)
    .gte('record_date', fmtYMD(since))
    .order('record_date', { ascending: false });
  
  if(error){
    console.error('[loadMyRecords]', error);
    container.innerHTML = `<div class="empty"><div class="msg">기록을 불러오지 못했어요</div><div class="hint">${escapeHtml(error.message)}</div></div>`;
    return;
  }
  
  if(!data || data.length === 0){
    document.getElementById('record-meta').textContent = '최근 14일 · 기록 없음';
    container.innerHTML = `
      <div class="empty">
        <div class="icon">📅</div>
        <div class="msg">아직 봉사 기록이 없어요</div>
        <div class="hint">첫 봉사를 시작해보세요</div>
      </div>`;
    return;
  }
  
  document.getElementById('record-meta').textContent = `최근 14일 · ${data.length}건`;
  
  const html = data.map(r => {
    const inDate  = r.check_in_at ? new Date(r.check_in_at) : null;
    const outDate = r.check_out_at ? new Date(r.check_out_at) : null;
    const timeText = inDate
      ? `${fmtHM(inDate)} – ${outDate ? fmtHM(outDate) : '진행 중'}`
      : '—';
    const duration = (inDate && outDate) ? fmtDuration(outDate - inDate) : '';
    
    // 상태 태그
    let tagHtml = '';
    if(!outDate && inDate) tagHtml = '<span class="tag working">봉사 중</span>';
    else if(outDate)       tagHtml = '<span class="tag done">종료</span>';
    
    // GPS 인증 칩 (시작·종료 각각)
    let gpsHtml = '';
    if(r.gps_verified === true){
      gpsHtml += `<span class="gps-chip ok" title="시작 GPS 인증${r.check_in_distance != null ? ' · ' + fmtDistance(r.check_in_distance) : ''}">📍시</span>`;
    } else if(r.check_in_at && r.gps_verified === false){
      gpsHtml += `<span class="gps-chip miss" title="시작 GPS 미인증">📍시</span>`;
    }
    if(r.check_out_at && r.gps_verified_out === true){
      gpsHtml += `<span class="gps-chip ok" title="종료 GPS 인증${r.check_out_distance != null ? ' · ' + fmtDistance(r.check_out_distance) : ''}">📍종</span>`;
    } else if(r.check_out_at && r.gps_verified_out === false){
      gpsHtml += `<span class="gps-chip miss" title="종료 GPS 미인증">📍종</span>`;
    }
    
    // 사유 표시 (있을 때만, 두 번째 줄)
    const reasons = [];
    if(r.check_in_reason)  reasons.push(`시작: ${r.check_in_reason}`);
    if(r.check_out_reason) reasons.push(`종료: ${r.check_out_reason}`);
    const reasonHtml = reasons.length > 0
      ? `<div class="history-reason">${escapeHtml(reasons.join(' / '))}</div>`
      : '';
    
    return `
      <div class="history-row-wrap">
        <div class="history-row">
          <span class="history-date">${fmtDateKor(r.record_date)}</span>
          <span class="history-time">${timeText}</span>
          ${gpsHtml}
          <span class="history-duration">${duration}</span>
          ${tagHtml}
        </div>
        ${reasonHtml}
      </div>`;
  }).join('');
  
  container.innerHTML = `<div class="history-list">${html}</div>`;
}

async function onAddMember(){
  const deptId = document.getElementById('add-mem-dept').value;
  const name = document.getElementById('add-mem-name').value.trim();
  const role = document.getElementById('add-mem-role').value;
  const phone = document.getElementById('add-mem-phone').value.trim();
  const err = document.getElementById('add-mem-err');
  err.textContent = '';

  // 검증
  if(!deptId){ err.textContent = '부서를 선택해주세요'; return; }
  if(!name){ err.textContent = '이름을 입력해주세요'; return; }
  if(name.length < 2){ err.textContent = '이름은 2자 이상'; return; }

  // 같은 부서·이름 중복 체크
  const dup = allMembers.find(m => m.dept_id === deptId && m.name === name);
  if(dup){
    err.textContent = `이미 등록된 사명자입니다 (${dup.is_active ? '활성' : '비활성'})`;
    return;
  }

  // sort_order — 부장이면 0, 그 외는 같은 부서 max + 1
  let sortOrder = 0;
  if(role !== '부장'){
    const sameDeptOrders = allMembers
      .filter(m => m.dept_id === deptId)
      .map(m => m.sort_order || 0);
    sortOrder = sameDeptOrders.length > 0 ? Math.max(...sameDeptOrders) + 1 : 1;
  }

  const row = {
    dept_id:    deptId,
    name:       name,
    role:       role,
    phone:      phone || null,
    is_active:  true,
    sort_order: sortOrder,
  };

  const { data, error } = await sb
    .from('attend_members')
    .insert(row)
    .select()
    .single();

  if(error){
    console.error('[onAddMember]', error);
    err.textContent = '추가 실패: ' + (error.message || '서버 오류');
    return;
  }

  // 폼 초기화
  document.getElementById('add-mem-name').value = '';
  document.getElementById('add-mem-phone').value = '';
  // 부서·역할은 그대로 (연속 등록 편의)
  
  showToast(`✅ ${data.name} 추가됨`);
  await loadAllMembersAdmin();
  // 메인 사명자 목록도 갱신
  await loadAllMembers();
}

    const rec = recordByMember[m.id] || null;
    let status;
    if(!rec) status = 'none';
    else if(rec.check_in_at && !rec.check_out_at) status = 'working';
    else if(rec.check_in_at && rec.check_out_at) status = 'done';
    else status = 'none';
    return { member: m, record: rec, status };
  });
  
  // 필터
  if(deptFilter) rows = rows.filter(r => r.member.dept_id === deptFilter);
  if(statusFilter) rows = rows.filter(r => r.status === statusFilter);
  
  // 정렬: 부서 → 역할(부장 위) → 이름
  rows.sort((a, b) => {
    const aDept = DEPTS.findIndex(d => d.id === a.member.dept_id);
    const bDept = DEPTS.findIndex(d => d.id === b.member.dept_id);
    if(aDept !== bDept) return aDept - bDept;
    if(a.member.sort_order !== b.member.sort_order) return a.member.sort_order - b.member.sort_order;
    return a.member.name.localeCompare(b.member.name);
  });
  
  document.getElementById('admin-table-meta').textContent =
    `${rows.length}명 / 전체 ${allMembers.length}명`;
  
  const container = document.getElementById('admin-today-list');
  if(rows.length === 0){
    container.innerHTML = `<div class="empty"><div class="msg">조건에 맞는 사명자가 없어요</div></div>`;
    return;
  }
  
  const head = `
    <div class="admin-table-row head">
      <span>이름 · 역할</span>
      <span>부서</span>
      <span>시작</span>
      <span>종료</span>
      <span>봉사 시간</span>
      <span>GPS</span>
      <span>상태</span>
    </div>`;
  
  const body = rows.map(({ member, record, status }) => {
    const dept = DEPTS.find(d => d.id === member.dept_id);
    const deptName = dept ? dept.name : member.dept_id;
    
    const inTime  = record?.check_in_at  ? fmtHM(new Date(record.check_in_at))  : '—';
    const outTime = record?.check_out_at ? fmtHM(new Date(record.check_out_at)) : (record?.check_in_at ? '—' : '—');
    const duration = (record?.check_in_at && record?.check_out_at)
      ? fmtDuration(new Date(record.check_out_at) - new Date(record.check_in_at))
      : '—';
    
    // GPS 인증 — 시작·종료 둘 다 확인
    let gpsHtml = '—';
    if(record){
      const inOk  = record.gps_verified === true;
      const outOk = record.gps_verified_out === true;
      const inAny = record.check_in_at != null;
      const outAny = record.check_out_at != null;
      const marks = [];
      if(inAny)  marks.push(inOk  ? '<span class="gps-chip ok">시</span>' : '<span class="gps-chip miss">시</span>');
      if(outAny) marks.push(outOk ? '<span class="gps-chip ok">종</span>' : '<span class="gps-chip miss">종</span>');
      if(marks.length > 0) gpsHtml = marks.join(' ');
    }
    
    // 상태 태그
    let tagHtml = '';
    if(status === 'working') tagHtml = '<span class="tag working">봉사 중</span>';
    else if(status === 'done') tagHtml = '<span class="tag done">종료</span>';
    else tagHtml = '<span class="tag" style="background:var(--absent-soft);color:var(--text-3)">미시작</span>';
    
    return `
      <div class="admin-table-row">
        <span><span class="col-name">${escapeHtml(member.name)}</span> <span class="col-role">${escapeHtml(member.role || '')}</span></span>
        <span class="col-dept">${escapeHtml(deptName)}</span>
        <span class="col-time">${inTime}</span>
        <span class="col-time">${outTime}</span>
        <span class="col-dur">${duration}</span>
        <span>${gpsHtml}</span>
        <span>${tagHtml}</span>
      </div>`;
  }).join('');
  
  container.innerHTML = head + body;
}


async function init(){
  setPageDate();
  startClock();
  await loadAllMembers();
  await loadAllLocations();
  // 저장된 사명자 자동 복원 (잠금 모드)
  const restored = await restoreSavedMember();
  if(!restored){
    renderUnlockedPicker();
  }
  // 관리자 자동 로그인 복원
  restoreAdmin();
  // 비번 Enter 키
  const pwInput = document.getElementById('admin-pw');
  if(pwInput){
    pwInput.addEventListener('keydown', e => {
      if(e.key === 'Enter') doAdminLogin();
    });
  }
}

init();
</script>
